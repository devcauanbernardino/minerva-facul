# ===== Identificacao =====
spring.application.name=minerva

# ===== Banco SQLite (arquivo em backend/data/) =====
spring.datasource.url=jdbc:sqlite:./data/minerva.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON

# ===== Servidor =====
server.port=8080

# ===== OpenAPI / Swagger (RNF07) =====
# UI: http://localhost:8080/swagger-ui.html
# JSON: http://localhost:8080/v3/api-docs
# Banco: abra backend/data/minerva.db com DB Browser for SQLite (https://sqlitebrowser.org)
